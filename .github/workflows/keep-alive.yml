name: Keep Render Alive

on:
  schedule:
    - cron: '*/14 * * * *'   # every 14 min — just under Render's 15-min sleep threshold
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render backend
        run: |
          echo "Pinging Render..."

          # Retry up to 3 times with a 15-second gap.
          # --max-time 60: gives Render a full cold-start window.
          # Status 000 = timeout/no response; retry rather than fail immediately.
          for attempt in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 https://tacsfon-bookshop.onrender.com/api/health)
            echo "Attempt $attempt: HTTP $STATUS"

            if [ "$STATUS" = "200" ] || [ "$STATUS" = "204" ]; then
              echo "Backend is alive"
              exit 0
            elif [ "$STATUS" = "000" ]; then
              echo "Timeout on attempt $attempt - Render may be waking up"
              sleep 15
            elif [ "$STATUS" -ge 500 ]; then
              echo "Server error ($STATUS)"
              exit 1
            else
              echo "Responded with $STATUS - alive"
              exit 0
            fi
          done

          echo "All 3 attempts timed out - Render may be down or URL changed"
          exit 1
